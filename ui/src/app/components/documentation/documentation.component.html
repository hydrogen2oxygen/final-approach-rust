<h2 mat-dialog-title>Documentation</h2>
<mat-dialog-content>
  <p>Press <b>F-11</b> key for <b>fullscreen</b>.</p>

  <div style="display: flex; gap: 2rem;">
    <div class="col">
      <h2>DESIGNER MODE - F2</h2>
      <h3>Shortcuts</h3>
      <ul>
        <li><span class="badge">CTRL+D</span> Draw a polygon</li>
        <li><span class="badge">CTRL+E</span> Edit mode</li>
        <li><span class="badge">CTRL+S</span> Save modifications</li>
        <li><span class="badge">DEL</span> Delete selected polygon</li>
        <li><span class="badge">ESC</span> Stop editing</li>
        <li><span class="badge">F-11</span> Fullscreen mode</li>
      </ul>
    </div>
    <div class="col">
      <h2>MANAGER MODE - F3</h2>
      <p>TODO Description how to use it ...</p>
    </div>
  </div>
</mat-dialog-content>
<mat-dialog-actions>
    <button mat-button mat-dialog-close>Close</button>
</mat-dialog-actions>
